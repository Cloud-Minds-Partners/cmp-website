name: Deploy cmp-website

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: cmp-website-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Surface secrets as env vars so expressions can gate on them
      HAS_KNOWLEDGE_TOKEN: ${{ secrets.CMP_KNOWLEDGE_READ_TOKEN != '' }}
      HAS_FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN != '' }}
    steps:
      - name: Checkout cmp-website
        uses: actions/checkout@v4
        with:
          path: cmp-website

      - name: Checkout cmp-knowledge (content source)
        if: env.HAS_KNOWLEDGE_TOKEN == 'true'
        uses: actions/checkout@v4
        with:
          repository: Cloud-Minds-Partners/cmp-knowledge
          path: cmp-knowledge
          token: ${{ secrets.CMP_KNOWLEDGE_READ_TOKEN }}

      - name: Warn when building without content source
        if: env.HAS_KNOWLEDGE_TOKEN != 'true'
        run: |
          echo "::warning::CMP_KNOWLEDGE_READ_TOKEN not set — content collections will be empty."
          echo "Set the repo secret to deploy published memos/radar/regwatch/people."
          mkdir -p cmp-knowledge/knowledge/memos/published \
                   cmp-knowledge/knowledge/innovation-radar \
                   cmp-knowledge/knowledge/regwatch \
                   cmp-knowledge/people/photos \
                   cmp-knowledge/people/advisors

      - name: Stage people photos into /public/people/photos
        if: env.HAS_KNOWLEDGE_TOKEN == 'true'
        run: |
          mkdir -p cmp-website/public/people/photos
          if [ -d cmp-knowledge/people/photos ]; then
            cp -R cmp-knowledge/people/photos/. cmp-website/public/people/photos/ || true
            echo "copied $(ls cmp-website/public/people/photos | wc -l) photo(s)"
          fi

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: cmp-website/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: cmp-website

      - name: Build
        run: npm run build
        working-directory: cmp-website

      - name: Deploy to Firebase Hosting (cmp-website site)
        if: env.HAS_FIREBASE_TOKEN == 'true'
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:cmp-website --project dcplatformcmp --non-interactive
        working-directory: cmp-website
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Skipping deploy (no token)
        if: env.HAS_FIREBASE_TOKEN != 'true'
        run: |
          echo "::warning::FIREBASE_TOKEN not set — build validated, deploy skipped."
          echo "Set FIREBASE_TOKEN repo secret (value from `firebase login:ci`) to enable deploys."
