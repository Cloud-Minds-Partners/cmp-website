name: Deploy cmp-website

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: cmp-website-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Surface the secret as an env var so expressions can gate on it
      HAS_KNOWLEDGE_TOKEN: ${{ secrets.CMP_KNOWLEDGE_READ_TOKEN != '' }}
    steps:
      - name: Checkout cmp-website
        uses: actions/checkout@v4
        with:
          path: cmp-website

      - name: Checkout cmp-knowledge (content source)
        if: env.HAS_KNOWLEDGE_TOKEN == 'true'
        uses: actions/checkout@v4
        with:
          repository: Cloud-Minds-Partners/cmp-knowledge
          path: cmp-knowledge
          token: ${{ secrets.CMP_KNOWLEDGE_READ_TOKEN }}

      - name: Warn when building without content source
        if: env.HAS_KNOWLEDGE_TOKEN != 'true'
        run: |
          echo "::warning::CMP_KNOWLEDGE_READ_TOKEN not set — content collections will be empty."
          echo "Set the repo secret to deploy published memos/radar/regwatch."
          mkdir -p cmp-knowledge/knowledge/memos/published cmp-knowledge/knowledge/innovation-radar cmp-knowledge/knowledge/regwatch

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: cmp-website/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: cmp-website

      - name: Build
        run: npm run build
        working-directory: cmp-website

      - name: Deploy to Firebase Hosting (cmp-website site)
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:cmp-website --project dcplatformcmp --non-interactive
        working-directory: cmp-website
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
