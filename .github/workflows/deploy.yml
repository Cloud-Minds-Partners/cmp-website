name: Deploy cmp-website

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - ".planning/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cmp-website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for FirebaseExtended/action-hosting-deploy OIDC
      pull-requests: write  # required for preview channel PR comment

    steps:
      # ------------------------------------------------------------------ #
      # PRE-FLIGHT: hard-fail if required deploy secret is absent           #
      # Per CMP rule #8b — silent-skip is failure. Build must not succeed   #
      # without deploying when on main. Non-main branches deploy preview.   #
      # ------------------------------------------------------------------ #
      - name: Pre-flight — assert deploy secret present
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_DCPLATFORMCMP }}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_DCPLATFORMCMP is not set."
            echo "Required for all deploys. Set the repo secret (Firebase service account JSON)."
            echo "See: Firebase Console → Project Settings → Service Accounts → Generate new private key"
            exit 1
          fi
          echo "Deploy secret present — continuing."

      # ------------------------------------------------------------------ #
      # CHECKOUT                                                             #
      # ------------------------------------------------------------------ #
      - name: Checkout cmp-website
        uses: actions/checkout@v4
        with:
          path: cmp-website

      - name: Checkout cmp-knowledge (content source)
        if: ${{ secrets.CMP_KNOWLEDGE_READ_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: Cloud-Minds-Partners/cmp-knowledge
          path: cmp-knowledge
          token: ${{ secrets.CMP_KNOWLEDGE_READ_TOKEN }}

      - name: Warn when building without content source
        if: ${{ secrets.CMP_KNOWLEDGE_READ_TOKEN == '' }}
        run: |
          echo "::warning::CMP_KNOWLEDGE_READ_TOKEN not set — content collections will be empty."
          echo "Set the repo secret to deploy published memos/radar/regwatch/people."
          mkdir -p cmp-knowledge/knowledge/memos/published \
                   cmp-knowledge/knowledge/innovation-radar \
                   cmp-knowledge/knowledge/regwatch \
                   cmp-knowledge/people/photos \
                   cmp-knowledge/people/advisors

      - name: Stage people photos into /public/people/photos
        if: ${{ secrets.CMP_KNOWLEDGE_READ_TOKEN != '' }}
        run: |
          mkdir -p cmp-website/public/people/photos
          if [ -d cmp-knowledge/people/photos ]; then
            cp -R cmp-knowledge/people/photos/. cmp-website/public/people/photos/ || true
            echo "copied $(ls cmp-website/public/people/photos | wc -l) photo(s)"
          fi

      # ------------------------------------------------------------------ #
      # BUILD                                                                #
      # ------------------------------------------------------------------ #
      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: cmp-website/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: cmp-website

      - name: Build
        run: npm run build
        working-directory: cmp-website

      # ------------------------------------------------------------------ #
      # POST-BUILD ARTIFACT VALIDATION                                       #
      # Hard-fail if critical routes are missing from dist/                 #
      # ------------------------------------------------------------------ #
      - name: Validate build artifacts
        run: |
          MISSING=0
          check() {
            if [ ! -e "cmp-website/dist/$1" ]; then
              echo "::error::Missing build artifact: dist/$1"
              MISSING=$((MISSING+1))
            else
              echo "FOUND: dist/$1"
            fi
          }
          check "index.html"
          check "sitemap-index.xml"
          check "robots.txt"
          check "404.html"
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING artifact(s) missing from dist/ — aborting deploy."
            exit 1
          fi
          echo "All required artifacts present."

      # ------------------------------------------------------------------ #
      # LIGHTHOUSE CI                                                        #
      # Perf ≥ 0.9, A11Y ≥ 0.95, SEO ≥ 0.95                              #
      # Runs against static dist/ (no server needed)                        #
      # ------------------------------------------------------------------ #
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli
        working-directory: cmp-website

      - name: Run Lighthouse CI
        run: lhci autorun
        working-directory: cmp-website
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      # ------------------------------------------------------------------ #
      # DEPLOY — Preview channel (non-main branches)                        #
      # FirebaseExtended/action-hosting-deploy posts a PR comment with URL  #
      # ------------------------------------------------------------------ #
      - name: Deploy preview channel
        if: github.ref != 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DCPLATFORMCMP }}
          projectId: dcplatformcmp
          target: cmp-website
          expires: 7d
          channelId: preview-${{ github.head_ref || github.ref_name }}
          entryPoint: ./cmp-website

      # ------------------------------------------------------------------ #
      # DEPLOY — Live channel (main only)                                   #
      # ------------------------------------------------------------------ #
      - name: Deploy live
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DCPLATFORMCMP }}
          projectId: dcplatformcmp
          target: cmp-website
          channelId: live
          entryPoint: ./cmp-website
